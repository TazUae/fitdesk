services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Tell Dokploy which internal container port to route to.
    expose:
      - "3000"

    # Dokploy/Compose can override the image CMD in some setups.
    # Be explicit: run idempotent schema migration before starting the app.
    command: ["node", "scripts/start-with-migrations.mjs"]

    # Load all environment variables from .env file.
    # Never commit .env — see .env.example for required variables.
    env_file: .env

    # No host ports: Dokploy (or similar) attaches the reverse proxy to the
    # compose network and routes https://your-domain → container :3000 internally.

    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0

    volumes:
      # Persist the SQLite auth database across container restarts.
      # In production with Turso this volume is unused — Better Auth will use
      # the remote libsql URL from DATABASE_URL instead.
      - db_data:/app/data

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - dokploy-network

volumes:
  db_data:
    driver: local

networks:
  dokploy-network:
    external: true