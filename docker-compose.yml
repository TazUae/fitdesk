services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Tell Dokploy which internal container port to route to.
    expose:
      - "3000"

    # Load all environment variables from .env file.
    # Never commit .env — see .env.example for required variables.
    env_file: .env

    # No host ports: Dokploy (or similar) attaches the reverse proxy to the
    # compose network and routes https://your-domain → container :3000 internally.

    volumes:
      # Persist the SQLite auth database across container restarts.
      # In production with Turso this volume is unused — Better Auth will use
      # the remote libsql URL from DATABASE_URL instead.
      - db_data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - dokploy-network

volumes:
  db_data:
    driver: local

networks:
  dokploy-network:
    external: true